name: harness-self-review

# Weekly meta-loop: mines Steve's local Claude Code session logs for
# friction patterns and opens GitHub issues against this repo with
# proposed harness improvements. This is the M9 self-improvement loop.
#
# IMPORTANT: this workflow is a TEMPLATE — it cannot run on GitHub-hosted
# runners because the session logs live on Steve's local machine
# (~/.claude/projects/). It is shipped here as documentation + as a
# self-hosted-runner config for when Steve sets one up.
#
# To run today: invoke locally via
#   bash plugins/aws-harness/skills/session-log-miner/scripts/mine.sh \
#     --days 7 --threshold 3 --output json \
#     | bash plugins/aws-harness/skills/harness-improvement-proposer/scripts/propose.sh \
#         --max-issues 5
#
# A scheduled local cron is the right answer until a self-hosted runner
# exists.

on:
  schedule:
    # Sundays 10:00 UTC — once per week, after the week's work is done.
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of session history to mine'
        required: false
        default: '7'
      threshold:
        description: 'Minimum frequency before a pattern is reported'
        required: false
        default: '3'
      dry_run:
        description: 'Print proposals without opening issues'
        required: false
        default: 'false'

permissions:
  issues: write
  contents: read

jobs:
  self-review:
    name: Mine session logs and propose harness improvements
    runs-on: [self-hosted, harness-maintainer]
    timeout-minutes: 15
    if: github.repository_owner == 'sjramblings'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify session log directory
        run: |
          set -euo pipefail
          if [[ ! -d "$HOME/.claude/projects" ]]; then
            echo "::warning ::~/.claude/projects not found on this runner — nothing to mine"
            exit 0
          fi

      - name: Mine session logs
        id: mine
        run: |
          set -euo pipefail
          DAYS="${{ inputs.days || '7' }}"
          THRESHOLD="${{ inputs.threshold || '3' }}"
          mkdir -p .harness-cache
          bash plugins/aws-harness/skills/session-log-miner/scripts/mine.sh \
            --days "$DAYS" \
            --threshold "$THRESHOLD" \
            --output json \
            > .harness-cache/miner-output.json
          PATTERN_COUNT=$(jq '.patterns | length' .harness-cache/miner-output.json)
          echo "pattern_count=${PATTERN_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Propose improvements
        if: steps.mine.outputs.pattern_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DRY_FLAG=""
          if [[ "${{ inputs.dry_run || 'false' }}" == "true" ]]; then
            DRY_FLAG="--dry-run"
          fi
          bash plugins/aws-harness/skills/harness-improvement-proposer/scripts/propose.sh \
            --input .harness-cache/miner-output.json \
            --repo ${{ github.repository }} \
            --max-issues 5 \
            $DRY_FLAG

      - name: Update meta-metrics
        if: steps.mine.outputs.pattern_count != '0'
        run: |
          set -euo pipefail
          # Append a row to QUALITY_SCORE.md history
          score_file="plugins/aws-harness/docs/QUALITY_SCORE.md"
          if [[ -f "$score_file" ]]; then
            week=$(date -u +%Y-%V)
            echo "| ${week} | ${{ steps.mine.outputs.pattern_count }} | weekly self-review |" >> "$score_file"
          fi

      - name: Upload miner output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: miner-output
          path: .harness-cache/miner-output.json
          retention-days: 30
