name: lint

# Runs harness custom lints against cdk synth output + governance files.
# Invoked on every PR. Mirrors the pre-commit hook configuration.

on:
  pull_request:
    paths:
      - 'cdk/**'
      - 'lib/**'
      - 'src/**'
      - 'handlers/**'
      - 'services/**'
      - 'docs/**'
      - 'AGENTS.md'
      - 'tools/lints/**'
  workflow_dispatch:
    inputs:
      fail_on:
        description: 'Minimum severity to fail on'
        required: false
        default: 'high'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: |
          npm ci
          # ts-node required by run-lints.ts
          npm install --no-save ts-node typescript

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_PRIMARY_REGION }}

      - name: cdk synth
        run: |
          set -euo pipefail
          if [[ -d cdk ]]; then
            ( cd cdk && npx cdk synth --quiet )
          fi

      - name: Run security-review-aws
        id: review
        run: |
          set -euo pipefail
          bash plugins/aws-harness/skills/security-review-aws/scripts/review.sh \
            --app ./cdk \
            --fail-on "${{ inputs.fail_on || 'high' }}" \
            | tee lint-findings.tsv

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-findings
          path: lint-findings.tsv
          retention-days: 14

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## security-review-aws FAILED\n\nFindings above threshold:\n\n```\n';
            try {
              body += fs.readFileSync('lint-findings.tsv', 'utf8');
            } catch (e) {
              body += '(no output captured)';
            }
            body += '\n```\n\nSee `docs/golden-principles.md` and the `docs/references/*-llms.txt` files referenced by each message.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
